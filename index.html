        body {

            background-color: #0a0a0a;
            color: #e5e5e5;
        }

        .active-nav {
            color: #60a5fa;
            border-bottom: 2px solid #60a5fa;
        }

        .section {
            display: none;
        }

        .section.active {
            display: block;
        }

        .card {
            background: #111111;
            border: 1px solid #262626;
            transition: border-color 0.2s;
        }

        .card:hover {
            border-color: #60a5fa;
        }

        .project-img-container {
            width: 100%;
            height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: #0a0a0a;
            border-radius: 4px;
            margin-bottom: 1rem;
            border: 1px solid #1a1a1a;
        }

        .project-img-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .img-cover {
            object-fit: cover !important;
            width: 100%;
            height: 100%;
        }

        .social-link {
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 6px;
            background: #111111;
            border: 1px solid #262626;
            color: #737373;
        }

        .social-link:hover {
            color: #60a5fa;
            border-color: #60a5fa;
        }

        hr {
            border: 0;
            height: 1px;
            background: #262626;
            margin: 2.5rem 0;
        }

    </style>
</head>

    </main>

    <script>
        function navigateTo(sectionId) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('nav a').forEach(b => b.classList.remove('active-nav'));

            document.getElementById(sectionId).classList.add('active');
            
            if (sectionId === 'home') document.getElementById('btn-home').classList.add('active-nav');
            
            window.scrollTo(0, 0);
        }

        function handleRoute() {
            const hash = window.location.hash.slice(1) || 'home';
            
            if (hash === 'home') {
                navigateTo('home');
            } else {
                navigateTo('home');
            }
        }

        window.addEventListener('hashchange', handleRoute);

        window.onload = () => {
            handleRoute();
        };
    </script>
